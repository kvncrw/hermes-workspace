services:
  hermes-workspace:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - HERMES_API_URL=${HERMES_API_URL:-http://host.docker.internal:8642}
      - HERMES_PASSWORD=${HERMES_PASSWORD:-}
      - HERMES_ALLOWED_HOSTS=${HERMES_ALLOWED_HOSTS:-}
    restart: unless-stopped

